<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OptiCalm - Full Screen Cosmic Video Space</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #e2e8f0;
            overflow: hidden;
            position: relative;
        }

        /* ইউটিউব ব্যাকগ্রাউন্ড ভিডিও কন্টেইনার - ফুল স্ক্রিন */
        .video-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            overflow: hidden;
            pointer-events: none; /* ভিডিওর ওপর ক্লিক আটকানোর জন্য */
            opacity: 0.5; /* ভিডিওর উজ্জ্বলতা কিছুটা কমানো হয়েছে যেন শেপগুলো পরিষ্কার দেখা যায় */
            transition: opacity 1s ease;
        }

        .video-background iframe {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100vw;
            height: 56.25vw; /* 16:9 Aspect Ratio */
            min-height: 100vh;
            min-width: 177.77vh;
            transform: translate(-50%, -50%);
        }

        /* কন্ট্রোল প্যানেল - সবকিছুর ওপরে থাকবে */
        .controls {
            position: absolute;
            z-index: 15;
            text-align: center;
            background: rgba(0, 0, 0, 0.7);
            padding: 25px;
            border-radius: 20px;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            max-width: 350px;
            width: 85%;
            transition: opacity 0.5s ease;
            box-shadow: 0 20px 50px rgba(0,0,0,0.9);
        }

        input, button {
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 12px;
            color: white;
            border-radius: 10px;
            font-size: 15px;
            outline: none;
            margin: 10px 0;
            width: 100%;
            box-sizing: border-box;
        }

        button {
            cursor: pointer;
            background: linear-gradient(90deg, #1e40af, #0284c7);
            font-weight: bold;
            border: none;
            transition: 0.3s ease;
        }

        button:hover { transform: scale(1.02); filter: brightness(1.2); }

        /* প্রধান অ্যানিমেশন কন্টেইনার */
        .main-display-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1;
        }

        .dual-eye-container {
            display: flex;
            justify-content: space-around;
            align-items: center;
            width: 100%;
            max-width: 1100px;
            height: 100%;
            position: absolute;
        }

        .eye-space {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 45%;
            height: 100%;
        }

        .shape {
            position: absolute;
            width: 260px;
            height: 260px;
            opacity: 0;
            display: none;
            filter: blur(25px);
            mix-blend-mode: screen;
        }

        .circle { border-radius: 50%; }
        @keyframes circleBreathe {
            0% { transform: scale(0.6); background: radial-gradient(circle, #00d2ff, #0066ff, transparent); box-shadow: 0 0 70px #0066ff; opacity: 0.3; }
            50% { transform: scale(1.3); background: radial-gradient(circle, #00ffcc, #00a3ff, transparent); box-shadow: 0 0 140px #00ffcc; opacity: 0.9; }
            100% { transform: scale(0.6); background: radial-gradient(circle, #00d2ff, #0066ff, transparent); box-shadow: 0 0 70px #0066ff; opacity: 0.3; }
        }

        .square { border-radius: 30px; }
        @keyframes squareBreathe {
            0% { transform: scale(0.6) rotate(0deg); background: radial-gradient(circle, #d946ef, #701a75, transparent); box-shadow: 0 0 70px #d946ef; opacity: 0.3; }
            50% { transform: scale(1.2) rotate(45deg); background: radial-gradient(circle, #ff007f, #aa00ff, transparent); box-shadow: 0 0 130px #ff007f; opacity: 0.8; }
            100% { transform: scale(0.6) rotate(90deg); background: radial-gradient(circle, #d946ef, #701a75, transparent); box-shadow: 0 0 70px #d946ef; opacity: 0.3; }
        }

        /* ক্রিস্টাল সাইনেসোইডাল ক্যানভাস */
        #cosmicCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: none;
            mix-blend-mode: screen;
            z-index: 2;
        }

        /* টাইমার ও টেক্সট ওভারলে */
        .info-overlay {
            position: absolute;
            bottom: 30px;
            z-index: 10;
            text-align: center;
            pointer-events: none;
        }

        .timer-display { font-size: 24px; font-weight: 300; letter-spacing: 2px; color: #cbd5e1; text-shadow: 0 2px 8px rgba(0,0,0,0.8); }
        .instruction { font-size: 18px; margin-top: 8px; color: #94a3b8; height: 25px; text-shadow: 0 2px 8px rgba(0,0,0,0.8); }
    </style>
</head>
<body>

    <div class="video-background">
        <div id="ytPlayer"></div>
    </div>

    <div class="controls" id="controlPanel">
        <h3 style="margin-top:0; color:#94a3b8; font-weight: 400;">Nature & Cosmic Healing</h3>
        <label style="font-size: 14px; color:#64748b;">সময় দিন (মিনিট):</label>
        <input type="number" id="timeInput" min="1" max="60" value="2">
        <button onclick="startHealingSession()">সেশন শুরু করুন</button>
    </div>

    <div class="main-display-container">
        <div class="dual-eye-container" id="dualEyeView">
            <div class="eye-space">
                <div class="shape circle" id="left-circleShape"></div>
                <div class="shape square" id="left-squareShape"></div>
            </div>
            <div class="eye-space">
                <div class="shape circle" id="right-circleShape"></div>
                <div class="shape square" id="right-squareShape"></div>
            </div>
        </div>

        <canvas id="cosmicCanvas"></canvas>
    </div>

    <div class="info-overlay">
        <div class="timer-display" id="timerDisplay"></div>
        <div class="instruction" id="instructionText"></div>
    </div>

    <script>
        let countdown;
        let modeInterval;
        let player;
        let animationFrameId;
        
        const cosmicCanvas = document.getElementById('cosmicCanvas');
        const ctx = cosmicCanvas.getContext('2d');
        
        let waveTime = 0;
        let isCosmicActive = false;

        function resizeCanvas() {
            cosmicCanvas.width = window.innerWidth;
            cosmicCanvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);

        // ইউটিউব API লোড
        const tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        document.getElementsByTagName('head')[0].appendChild(tag);

        // গ্যালাক্সি, ইউনিভার্স ও নেচার অ্যানিমেশন প্লেলিস্ট সেট করা
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('ytPlayer', {
                height: '100%',
                width: '100%',
                videoId: '1ZYbU82GVz4', // আপনার দেওয়া প্রকৃতির মায়াবী ভিডিও আইডি
                playerVars: {
                    'autoplay': 0,
                    'controls': 0,
                    'loop': 1,
                    'rel': 0,
                    'showinfo': 0,
                    'mute': 0, // অডিও বা মিউজিক শোনার জন্য মিউট অফ রাখা হলো
                    'playlist': '1ZYbU82GVz4' // লুপে চালানোর জন্য প্লেলিস্ট আইডি
                }
            });
        }

        // ক্রিস্টাল ক্লিয়ার সাইনেসোইডাল তরঙ্গ রেন্ডারিং
        function renderCosmicWaves() {
            if (!isCosmicActive) return;
            waveTime += 0.015;

            const w = cosmicCanvas.width;
            const h = cosmicCanvas.height;
            ctx.clearRect(0, 0, w, h);

            ctx.save();
            ctx.translate(w / 2, h / 2);

            let pulseScale = 1.0 + Math.sin(waveTime * 0.5) * 0.25; 
            ctx.scale(pulseScale, pulseScale);

            for (let k = 0; k < 5; k++) {
                ctx.beginPath();
                
                let colors = [
                    'rgba(0, 191, 255, 0.85)',  
                    'rgba(0, 255, 204, 0.80)',  
                    'rgba(236, 72, 153, 0.75)',  
                    'rgba(168, 85, 247, 0.70)',  
                    'rgba(34, 211, 238, 0.65)'   
                ];
                
                const edge = w / 2;
                for (let x = -edge; x <= edge; x += 3) {
                    let angle = (x * 0.005) + waveTime + (k * Math.PI / 2.5);
                    let y = Math.sin(angle) * 110 * Math.cos(angle * 0.4 + waveTime * 0.2);
                    let twistX = x + Math.sin(waveTime * 0.8 + k) * 25;

                    if (x === -edge) ctx.moveTo(twistX, y);
                    else ctx.lineTo(twistX, y);
                }

                ctx.lineWidth = 2.5; 
                ctx.strokeStyle = colors[k];
                ctx.stroke();
            }

            ctx.restore();
            animationFrameId = requestAnimationFrame(renderCosmicWaves);
        }

        function startHealingSession() {
            const minutes = document.getElementById('timeInput').value;
            let totalSeconds = minutes * 60;
            if (totalSeconds <= 0 || isNaN(totalSeconds)) return;

            resizeCanvas();

            document.getElementById('controlPanel').style.opacity = '0';
            setTimeout(() => { document.getElementById('controlPanel').style.display = 'none'; }, 500);

            // ব্যাকগ্রাউন্ডে প্রকৃতির মায়াবী ভিডিও ও রিলাক্সিং মিউজিক প্লে করা
            if (player && player.playVideo) { 
                player.setVolume(80); 
                player.playVideo(); 
                document.querySelector('.video-background').style.opacity = "0.6"; // ভিডিও ভিজিবল করা হলো
            }

            let currentMode = 0; 
            changeMode(currentMode);

            modeInterval = setInterval(() => {
                currentMode = (currentMode + 1) % 3;
                changeMode(currentMode);
            }, 15000);

            updateUI(totalSeconds);
            countdown = setInterval(() => {
                totalSeconds--;
                updateUI(totalSeconds);
                if (totalSeconds <= 0) {
                    clearInterval(countdown);
                    clearInterval(modeInterval);
                    endSession();
                }
            }, 1000);
        }

        function changeMode(mode) {
            document.getElementById('left-circleShape').style.display = 'none';
            document.getElementById('right-circleShape').style.display = 'none';
            document.getElementById('left-squareShape').style.display = 'none';
            document.getElementById('right-squareShape').style.display = 'none';
            document.getElementById('dualEyeView').style.display = 'none';
            cosmicCanvas.style.display = 'none';
            isCosmicActive = false;
            cancelAnimationFrame(animationFrameId);

            const insText = document.getElementById('instructionText');

            if (mode === 0) {
                document.getElementById('dualEyeView').style.display = 'flex';
                document.getElementById('left-circleShape').style.display = 'block';
                document.getElementById('left-circleShape').style.animation = 'circleBreathe 8s ease-in-out infinite';
                document.getElementById('right-circleShape').style.display = 'block';
                document.getElementById('right-circleShape').style.animation = 'circleBreathe 8s ease-in-out infinite';
                insText.innerText = "বৃত্তের প্রসারণের সাথে দুই চোখ শিথিল করুন...";
            } else if (mode === 1) {
                document.getElementById('dualEyeView').style.display = 'flex';
                document.getElementById('left-squareShape').style.display = 'block';
                document.getElementById('left-squareShape').style.animation = 'squareBreathe 9s ease-in-out infinite';
                document.getElementById('right-squareShape').style.display = 'block';
                document.getElementById('right-squareShape').style.animation = 'squareBreathe 9s ease-in-out infinite';
                insText.innerText = "ধীর গতির আবর্তনটি অনুভব করুন...";
            } else if (mode === 2) {
                cosmicCanvas.style.display = 'block';
                isCosmicActive = true;
                renderCosmicWaves();
                insText.innerText = "কসমিক সাইন তরঙ্গের ছন্দে চোখ এলিয়ে দিন...";
            }
        }

        function updateUI(seconds) {
            const min = Math.floor(seconds / 60);
            const sec = seconds % 60;
            document.getElementById('timerDisplay').innerText = 
                `${min.toString().padStart(2, '0')}:${sec.toString().padStart(2, '0')}`;
        }

        function endSession() {
            if (player && player.pauseVideo) {
                player.pauseVideo();
            }
            document.querySelector('.video-background').style.opacity = "0"; // ভিডিও আবার হাইড করা হলো
            isCosmicActive = false;
            cancelAnimationFrame(animationFrameId);
            
            document.getElementById('left-circleShape').style.display = 'none';
            document.getElementById('right-circleShape').style.display = 'none';
            document.getElementById('left-squareShape').style.display = 'none';
            document.getElementById('right-squareShape').style.display = 'none';
            cosmicCanvas.style.display = 'none';
            document.getElementById('dualEyeView').style.display = 'flex';
            
            document.getElementById('timerDisplay').innerText = "সেশন সম্পূর্ণ। আপনার চোখ ও মন এখন সতেজ।";
            document.getElementById('instructionText').innerText = "";
            
            setTimeout(() => {
                const cp = document.getElementById('controlPanel');
                cp.style.display = 'block';
                setTimeout(() => cp.style.opacity = '1', 50);
            }, 3000);
        }
    </script>
</body>
</html>
