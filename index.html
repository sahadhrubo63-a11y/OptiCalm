<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OptiCalm - Dual Eye Healing Space</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #e2e8f0;
            overflow: hidden;
        }

        .controls {
            z-index: 10;
            text-align: center;
            background: rgba(255, 255, 255, 0.02);
            padding: 25px;
            border-radius: 20px;
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            max-width: 350px;
            width: 85%;
            transition: opacity 0.5s ease;
        }

        input, button {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px;
            color: white;
            border-radius: 10px;
            font-size: 15px;
            outline: none;
            margin: 10px 0;
            width: 100%;
            box-sizing: border-box;
        }

        button {
            cursor: pointer;
            background: linear-gradient(90deg, #1e40af, #0284c7);
            font-weight: bold;
            border: none;
            transition: 0.3s ease;
        }

        button:hover { transform: scale(1.02); filter: brightness(1.2); }

        .dual-eye-container {
            display: flex;
            justify-content: space-around;
            align-items: center;
            width: 100vw;
            max-width: 1100px;
            height: 450px;
            position: relative;
        }

        .eye-space {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 45%;
            height: 100%;
        }

        /* সাধারণ শেপ স্টাইল */
        .shape {
            position: absolute;
            width: 240px;
            height: 240px;
            opacity: 0;
            display: none;
            filter: blur(20px);
            mix-blend-mode: screen;
        }

        .circle { border-radius: 50%; }
        @keyframes circleBreathe {
            0% { transform: scale(0.6); background: radial-gradient(circle, #00d2ff, #0066ff, transparent); box-shadow: 0 0 70px #0066ff; opacity: 0.3; }
            50% { transform: scale(1.3); background: radial-gradient(circle, #00ffcc, #00a3ff, transparent); box-shadow: 0 0 140px #00ffcc; opacity: 0.9; }
            100% { transform: scale(0.6); background: radial-gradient(circle, #00d2ff, #0066ff, transparent); box-shadow: 0 0 70px #0066ff; opacity: 0.3; }
        }

        .square { border-radius: 30px; }
        @keyframes squareBreathe {
            0% { transform: scale(0.6) rotate(0deg); background: radial-gradient(circle, #d946ef, #701a75, transparent); box-shadow: 0 0 70px #d946ef; opacity: 0.3; }
            50% { transform: scale(1.2) rotate(45deg); background: radial-gradient(circle, #ff007f, #aa00ff, transparent); box-shadow: 0 0 130px #ff007f; opacity: 0.8; }
            100% { transform: scale(0.6) rotate(90deg); background: radial-gradient(circle, #d946ef, #701a75, transparent); box-shadow: 0 0 70px #d946ef; opacity: 0.3; }
        }

        /* ফ্লুইড কসমিক তরঙ্গের জন্য ক্যানভাস স্টাইল */
        canvas {
            position: absolute;
            display: none;
            width: 350px;
            height: 350px;
            filter: blur(8px); /* জিপ ফাইলের মতো সফট তরঙ্গের আভা তৈরির জন্য */
            mix-blend-mode: screen;
        }

        .timer-display { font-size: 24px; margin-top: 20px; font-weight: 300; letter-spacing: 2px; color: #64748b; }
        .instruction { font-size: 18px; margin-top: 10px; color: #475569; height: 25px; text-align: center; }
        #ytPlayer { display: none; }
    </style>
</head>
<body>

    <div class="controls" id="controlPanel">
        <h3 style="margin-top:0; color:#94a3b8; font-weight: 400;">Dual Eye Cosmic Healing</h3>
        <label style="font-size: 14px; color:#64748b;">সময় দিন (মিনিট):</label>
        <input type="number" id="timeInput" min="1" max="60" value="2">
        <button onclick="startHealingSession()">সেশন শুরু করুন</button>
    </div>

    <div class="dual-eye-container">
        <div class="eye-space">
            <div class="shape circle" id="left-circleShape"></div>
            <div class="shape square" id="left-squareShape"></div>
            <canvas id="leftCanvas" width="400" height="400"></canvas>
        </div>
        <div class="eye-space">
            <div class="shape circle" id="right-circleShape"></div>
            <div class="shape square" id="right-squareShape"></div>
            <canvas id="rightCanvas" width="400" height="400"></canvas>
        </div>
    </div>

    <div class="timer-display" id="timerDisplay"></div>
    <div class="instruction" id="instructionText"></div>
    <div id="ytPlayer"></div>

    <script>
        let countdown;
        let shapeInterval;
        let player;
        let animationFrameId;
        
        const leftCanvas = document.getElementById('leftCanvas');
        const rightCanvas = document.getElementById('rightCanvas');
        const ctxLeft = leftCanvas.getContext('2d');
        const ctxRight = rightCanvas.getContext('2d');
        
        let waveTime = 0;
        let isWaveActive = false;

        // ইউটিউব API লোড
        const tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        document.getElementsByTagName('head')[0].appendChild(tag);

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('ytPlayer', {
                height: '0', width: '0', videoId: 'I3OJUwILelU',
                playerVars: { 'autoplay': 0, 'controls': 0, 'loop': 1, 'playlist': 'I3OJUwILelU' }
            });
        }

        // আপলোড করা জিপ ফাইলের মতো কসমিক ওয়েভ রেন্ডার করার ফাংশন
        function drawCosmicWave(ctx, width, height, time) {
            ctx.clearRect(0, 0, width, height);
            ctx.save();
            ctx.translate(width / 2, height / 2);

            // ব্রিদিং স্কেল (ধীরে ধীরে বড় এবং ছোট হওয়া)
            let breatheScale = 1 + Math.sin(time * 0.5) * 0.25;
            ctx.scale(breatheScale, breatheScale);

            // একাধিক পরিলিপির মাধ্যমে ডেনসিটি ও ওয়েভ তৈরি
            for (let j = 0; j < 3; j++) {
                ctx.beginPath();
                let baseRadius = 80 + j * 10;
                
                for (let i = 0; i <= 360; i += 2) {
                    let angle = (i * Math.PI) / 180;
                    
                    // ম্যাথমেটিক্যাল নয়েজ ট্র্যাকিং যা জিপের মতো অরগানিক মোশন দেয়
                    let offset = Math.sin(angle * 6 + time * 2) * 12 * Math.cos(angle * 3 - time);
                    let r = baseRadius + offset;
                    
                    let x = r * Math.cos(angle);
                    let y = r * Math.sin(angle);
                    
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                
                ctx.closePath();
                // গ্লোয়িং সায়ান-ব্লু কালার গ্রেডিয়েন্ট এফেক্ট
                ctx.lineWidth = 2.5;
                ctx.strokeStyle = j === 0 ? 'rgba(0, 210, 255, 0.7)' : (j === 1 ? 'rgba(0, 102, 255, 0.5)' : 'rgba(0, 255, 204, 0.4)');
                ctx.stroke();
            }
            ctx.restore();
        }

        function animateWaves() {
            if (!isWaveActive) return;
            waveTime += 0.03;
            drawCosmicWave(ctxLeft, 400, 400, waveTime);
            drawCosmicWave(ctxRight, 400, 400, waveTime);
            animationFrameId = requestAnimationFrame(animateWaves);
        }

        function startHealingSession() {
            const minutes = document.getElementById('timeInput').value;
            let totalSeconds = minutes * 60;
            if (totalSeconds <= 0 || isNaN(totalSeconds)) return;

            document.getElementById('controlPanel').style.opacity = '0';
            setTimeout(() => { document.getElementById('controlPanel').style.display = 'none'; }, 500);

            if (player && player.playVideo) { player.setVolume(80); player.playVideo(); }

            let currentMode = 0; // 0: Circle, 1: Square, 2: Cosmic Wave
            changeMode(currentMode);

            // প্রতি ১৫ সেকেন্ড পর পর মোড সুইপিং
            shapeInterval = setInterval(() => {
                currentMode = (currentMode + 1) % 3;
                changeMode(currentMode);
            }, 15000);

            updateUI(totalSeconds);
            countdown = setInterval(() => {
                totalSeconds--;
                updateUI(totalSeconds);
                if (totalSeconds <= 0) {
                    clearInterval(countdown);
                    clearInterval(shapeInterval);
                    endSession();
                }
            }, 1000);
        }

        function changeMode(mode) {
            // সমস্ত এলিমেন্ট রিসেট করা
            document.getElementById('left-circleShape').style.display = 'none';
            document.getElementById('right-circleShape').style.display = 'none';
            document.getElementById('left-squareShape').style.display = 'none';
            document.getElementById('right-squareShape').style.display = 'none';
            leftCanvas.style.display = 'none';
            rightCanvas.style.display = 'none';
            isWaveActive = false;
            cancelAnimationFrame(animationFrameId);

            const insText = document.getElementById('instructionText');

            if (mode === 0) {
                document.getElementById('left-circleShape').style.display = 'block';
                document.getElementById('left-circleShape').style.animation = 'circleBreathe 8s ease-in-out infinite';
                document.getElementById('right-circleShape').style.display = 'block';
                document.getElementById('right-circleShape').style.animation = 'circleBreathe 8s ease-in-out infinite';
                insText.innerText = "গোলকের প্রসারণের সাথে দুই চোখ শিথিল করুন...";
            } else if (mode === 1) {
                document.getElementById('left-squareShape').style.display = 'block';
                document.getElementById('left-squareShape').style.animation = 'squareBreathe 9s ease-in-out infinite';
                document.getElementById('right-squareShape').style.display = 'block';
                document.getElementById('right-squareShape').style.animation = 'squareBreathe 9s ease-in-out infinite';
                insText.innerText = "ধীর গতির সমান্তরাল আবর্তনটি অনুভব করুন...";
            } else if (mode === 2) {
                // আপনার জিপ ফাইলের কসমিক ওয়েভ মুড অ্যাক্টিভেট করা
                leftCanvas.style.display = 'block';
                rightCanvas.style.display = 'block';
                isWaveActive = true;
                animateWaves();
                insText.innerText = "কসমিক তরঙ্গের ছন্দে গভীরভাবে মগ্ন হোন...";
            }
        }

        function updateUI(seconds) {
            const min = Math.floor(seconds / 60);
            const sec = seconds % 60;
            document.getElementById('timerDisplay').innerText = 
                `${min.toString().padStart(2, '0')}:${sec.toString().padStart(2, '0')}`;
        }

        function endSession() {
            if (player && player.pauseVideo) player.pauseVideo();
            isWaveActive = false;
            cancelAnimationFrame(animationFrameId);
            
            document.getElementById('left-circleShape').style.display = 'none';
            document.getElementById('right-circleShape').style.display = 'none';
            document.getElementById('left-squareShape').style.display = 'none';
            document.getElementById('right-squareShape').style.display = 'none';
            leftCanvas.style.display = 'none';
            rightCanvas.style.display = 'none';
            
            document.getElementById('timerDisplay').innerText = "সেশন শেষ। আপনার দুই চোখ ও মন এখন সম্পূর্ণ শান্ত।";
            document.getElementById('instructionText').innerText = "";
            
            setTimeout(() => {
                const cp = document.getElementById('controlPanel');
                cp.style.display = 'block';
                setTimeout(() => cp.style.opacity = '1', 50);
            }, 3000);
        }
    </script>
</body>
</html>
