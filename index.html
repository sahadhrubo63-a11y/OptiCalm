<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OptiCalm - Dual Eye Healing Space</title>
    <style>
        /* পিওর ব্ল্যাক ব্যাকগ্রাউন্ড - যা চোখের অপটিক্যাল নার্ভকে সম্পূর্ণ রেস্ট দেয় */
        body {
            margin: 0;
            padding: 0;
            background: #000000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #e2e8f0;
            overflow: hidden;
        }

        /* কন্ট্রোল প্যানেল */
        .controls {
            z-index: 10;
            text-align: center;
            background: rgba(255, 255, 255, 0.02);
            padding: 25px;
            border-radius: 20px;
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            max-width: 350px;
            width: 85%;
            transition: opacity 0.5s ease;
        }

        input, button {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px;
            color: white;
            border-radius: 10px;
            font-size: 15px;
            outline: none;
            margin: 10px 0;
            width: 100%;
            box-sizing: border-box;
        }

        button {
            cursor: pointer;
            background: linear-gradient(90deg, #1e40af, #0284c7);
            font-weight: bold;
            border: none;
            transition: 0.3s ease;
        }

        button:hover {
            transform: scale(1.02);
            filter: brightness(1.2);
        }

        /* দুই চোখের জন্য দুই পাশের মেইন কন্টেইনার */
        .dual-eye-container {
            display: flex;
            justify-content: space-around;
            align-items: center;
            width: 100vw;
            max-width: 1000px;
            height: 450px;
            position: relative;
        }

        /* প্রতি চোখের জন্য নির্দিষ্ট অ্যানিমেশন এরিয়া */
        .eye-space {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 45%;
            height: 100%;
        }

        /* বড় এবং গ্লোয়িং শেপ স্টাইল (ঝাপসা আলো যা চোখে প্রশান্তি দেবে) */
        .shape {
            position: absolute;
            width: 240px; /* শেপের সাইজ বড় করা হয়েছে */
            height: 240px;
            opacity: 0;
            display: none;
            filter: blur(20px); /* ব্লার আরও স্মুথ করা হয়েছে */
            mix-blend-mode: screen;
        }

        /* ১. সার্কেল শেপ ও ব্রিদিং অ্যানিমেশন (কসমিক ব্লু টু সায়ান) */
        .circle {
            border-radius: 50%;
        }
        @keyframes circleBreathe {
            0% { transform: scale(0.6); background: radial-gradient(circle, #00d2ff, #0066ff, transparent); box-shadow: 0 0 70px #0066ff; opacity: 0.3; }
            50% { transform: scale(1.3); background: radial-gradient(circle, #00ffcc, #00a3ff, transparent); box-shadow: 0 0 140px #00ffcc; opacity: 0.9; }
            100% { transform: scale(0.6); background: radial-gradient(circle, #00d2ff, #0066ff, transparent); box-shadow: 0 0 70px #0066ff; opacity: 0.3; }
        }

        /* ২. স্কয়ার শেপ ও পালসিং অ্যানিমেশন (ডিপ পার্পেল টু সফট ম্যাজেন্টา) */
        .square {
            border-radius: 30px;
        }
        @keyframes squareBreathe {
            0% { transform: scale(0.6) rotate(0deg); background: radial-gradient(circle, #d946ef, #701a75, transparent); box-shadow: 0 0 70px #d946ef; opacity: 0.3; }
            50% { transform: scale(1.2) rotate(45deg); background: radial-gradient(circle, #ff007f, #aa00ff, transparent); box-shadow: 0 0 130px #ff007f; opacity: 0.8; }
            100% { transform: scale(0.6) rotate(90deg); background: radial-gradient(circle, #d946ef, #701a75, transparent); box-shadow: 0 0 70px #d946ef; opacity: 0.3; }
        }

        /* ৩. ট্রায়াঙ্গেল শেপ অ্যানিমেশন (হিলিং গ্রীন টু গোল্ডেন ভাইব) */
        .triangle {
            width: 0;
            height: 0;
            border-left: 140px solid transparent;
            border-right: 140px solid transparent;
            border-bottom: 240px solid #10b981;
            background: none !important;
            filter: blur(25px);
        }
        @keyframes triangleBreathe {
            0% { transform: scale(0.6) rotate(0deg); border-bottom-color: #10b981; opacity: 0.3; }
            50% { transform: scale(1.2) rotate(180deg); border-bottom-color: #f59e0b; opacity: 0.8; }
            100% { transform: scale(0.6) rotate(360deg); border-bottom-color: #10b981; opacity: 0.3; }
        }

        .timer-display { font-size: 24px; margin-top: 20px; font-weight: 300; letter-spacing: 2px; color: #64748b; }
        .instruction { font-size: 18px; margin-top: 10px; color: #475569; height: 25px; text-align: center; }
        
        #ytPlayer { display: none; }
    </style>
</head>
<body>

    <div class="controls" id="controlPanel">
        <h3 style="margin-top:0; color:#94a3b8; font-weight: 400;">Dual Eye Healing Space</h3>
        <label style="font-size: 14px; color:#64748b;">সময় দিন (মিনিট):</label>
        <input type="number" id="timeInput" min="1" max="60" value="2">
        <button onclick="startHealingSession()">সেশন শুরু করুন</button>
    </div>

    <!-- দুই চোখের জন্য সমান দুটি ভাগ সম্বলিত কন্টেইনার -->
    <div class="dual-eye-container">
        <!-- বাম চোখের স্পেস -->
        <div class="eye-space">
            <div class="shape circle" id="left-circleShape"></div>
            <div class="shape square" id="left-squareShape"></div>
            <div class="shape triangle" id="left-triangleShape"></div>
        </div>
        <!-- ডান চোখের স্পেস -->
        <div class="eye-space">
            <div class="shape circle" id="right-circleShape"></div>
            <div class="shape square" id="right-squareShape"></div>
            <div class="shape triangle" id="right-triangleShape"></div>
        </div>
    </div>

    <div class="timer-display" id="timerDisplay"></div>
    <div class="instruction" id="instructionText"></div>

    <div id="ytPlayer"></div>

    <script>
        let countdown;
        let shapeInterval;
        let player;
        const baseShapes = ['circleShape', 'squareShape', 'triangleShape'];
        const animations = ['circleBreathe 8s ease-in-out infinite', 'squareBreathe 9s ease-in-out infinite', 'triangleBreathe 10s ease-in-out infinite'];

        // ইউটিউব API লোড
        const tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        const firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('ytPlayer', {
                height: '0',
                width: '0',
                videoId: 'I3OJUwILelU',
                playerVars: {
                    'autoplay': 0,
                    'controls': 0,
                    'loop': 1,
                    'playlist': 'I3OJUwILelU'
                }
            });
        }

        function startHealingSession() {
            const minutes = document.getElementById('timeInput').value;
            let totalSeconds = minutes * 60;

            if (totalSeconds <= 0 || isNaN(totalSeconds)) return;

            document.getElementById('controlPanel').style.opacity = '0';
            setTimeout(() => { document.getElementById('controlPanel').style.display = 'none'; }, 500);

            if (player && player.playVideo) {
                player.setVolume(80);
                player.playVideo();
            }

            // প্রথম শেপ জোড়া চালু করা
            changeShape(0);

            // প্রতি ১৫ সেকেন্ড পর পর শেপ পরিবর্তন
            let currentShapeIndex = 0;
            shapeInterval = setInterval(() => {
                currentShapeIndex = (currentShapeIndex + 1) % baseShapes.length;
                changeShape(currentShapeIndex);
            }, 15000);

            updateUI(totalSeconds);
            countdown = setInterval(() => {
                totalSeconds--;
                updateUI(totalSeconds);

                if (totalSeconds <= 0) {
                    clearInterval(countdown);
                    clearInterval(shapeInterval);
                    endSession();
                }
            }, 1000);
        }

        function changeShape(index) {
            // বাম ও ডান পাশের সব শেপ আগে হাইড করা
            baseShapes.forEach(id => {
                document.getElementById('left-' + id).style.display = 'none';
                document.getElementById('left-' + id).style.animation = 'none';
                document.getElementById('right-' + id).style.display = 'none';
                document.getElementById('right-' + id).style.animation = 'none';
            });

            // বর্তমান ইনডেক্সের দুটি শেপ একসাথে অন করা
            const leftActive = document.getElementById('left-' + baseShapes[index]);
            const rightActive = document.getElementById('right-' + baseShapes[index]);
            
            leftActive.style.display = 'block';
            leftActive.style.animation = animations[index];
            
            rightActive.style.display = 'block';
            rightActive.style.animation = animations[index];

            const insText = document.getElementById('instructionText');
            if(index === 0) insText.innerText = "উভয় গোলকের প্রসারণের সাথে দুই চোখ শিথিল করুন...";
            else if(index === 1) insText.innerText = "ধীর গতির সমান্তরাল আবর্তনটি অনুভব করুন...";
            else insText.innerText = "গভীর প্রশান্তিতে মগ্ন হোন...";
        }

        function updateUI(seconds) {
            const min = Math.floor(seconds / 60);
            const sec = seconds % 60;
            document.getElementById('timerDisplay').innerText = 
                `${min.toString().padStart(2, '0')}:${sec.toString().padStart(2, '0')}`;
        }

        function endSession() {
            if (player && player.pauseVideo) {
                player.pauseVideo();
            }
            
            baseShapes.forEach(id => {
                document.getElementById('left-' + id).style.display = 'none';
                document.getElementById('right-' + id).style.display = 'none';
            });
            
            document.getElementById('timerDisplay').innerText = "সেশন শেষ। আপনার দুই চোখ ও মন এখন সম্পূর্ণ সতেজ।";
            document.getElementById('instructionText').innerText = "";
            
            setTimeout(() => {
                const cp = document.getElementById('controlPanel');
                cp.style.display = 'block';
                setTimeout(() => cp.style.opacity = '1', 50);
            }, 3000);
        }
    </script>
</body>
</html>
