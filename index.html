<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OptiCalm - 432Hz Deep Healing Space</title>
    <style>
        /* পিওর ব্ল্যাক ব্যাকগ্রাউন্ড - যা চোখের অপটিক্যাল নার্ভকে সম্পূর্ণ রেস্ট দেয় */
        body {
            margin: 0;
            padding: 0;
            background: #000000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #e2e8f0;
            overflow: hidden;
        }

        /* কন্ট্রোল প্যানেল */
        .controls {
            z-index: 10;
            text-align: center;
            background: rgba(255, 255, 255, 0.02);
            padding: 25px;
            border-radius: 20px;
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            max-width: 350px;
            width: 85%;
            transition: opacity 0.5s ease;
        }

        input, button {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px;
            color: white;
            border-radius: 10px;
            font-size: 15px;
            outline: none;
            margin: 10px 0;
            width: 100%;
            box-sizing: border-box;
        }

        button {
            cursor: pointer;
            background: linear-gradient(90deg, #1e40af, #0284c7);
            font-weight: bold;
            border: none;
            transition: 0.3s ease;
        }

        button:hover {
            transform: scale(1.02);
            filter: brightness(1.2);
        }

        /* মূল অ্যানিমেশন কন্টেইনার */
        .canvas-container {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 400px;
            height: 400px;
        }

        /* বেস শেপ স্টাইল - গ্লোয়িং ও ব্লারি এফেক্ট (600430c1d22c731b94cf4e7dae6b398a.gif ফাইলের মতো ওয়েভি লুকের জন্য) */
        .shape {
            position: absolute;
            width: 150px;
            height: 150px;
            opacity: 0;
            display: none;
            filter: blur(15px); /* তীক্ষ্ণ কোণা দূর করে চোখে শান্তি দেওয়ার জন্য */
            mix-blend-mode: screen;
        }

        /* ১. সার্কেল শেপ ও ব্রিদিং অ্যানিমেশন (কসমিক ব্লু টু সায়ান) */
        .circle {
            border-radius: 50%;
        }
        @keyframes circleBreathe {
            0% { transform: scale(0.6); background: radial-gradient(circle, #00d2ff, #0066ff, transparent); box-shadow: 0 0 60px #0066ff; opacity: 0.3; }
            50% { transform: scale(1.4); background: radial-gradient(circle, #00ffcc, #00a3ff, transparent); box-shadow: 0 0 120px #00ffcc; opacity: 0.9; }
            100% { transform: scale(0.6); background: radial-gradient(circle, #00d2ff, #0066ff, transparent); box-shadow: 0 0 60px #0066ff; opacity: 0.3; }
        }

        /* ২. স্কয়ার শেপ ও পালসিং অ্যানিমেশন (ডিপ পার্পেল টু সফট ম্যাজেন্টা) */
        .square {
            border-radius: 20px;
        }
        @keyframes squareBreathe {
            0% { transform: scale(0.6) rotate(0deg); background: radial-gradient(circle, #d946ef, #701a75, transparent); box-shadow: 0 0 60px #d946ef; opacity: 0.3; }
            50% { transform: scale(1.3) rotate(45deg); background: radial-gradient(circle, #ff007f, #aa00ff, transparent); box-shadow: 0 0 110px #ff007f; opacity: 0.8; }
            100% { transform: scale(0.6) rotate(90deg); background: radial-gradient(circle, #d946ef, #701a75, transparent); box-shadow: 0 0 60px #d946ef; opacity: 0.3; }
        }

        /* ৩. ট্রায়াঙ্গেল শেপ অ্যানিমেশন (হিলিং গ্রীন টু গোল্ডেন ভাইব) */
        .triangle {
            width: 0;
            height: 0;
            border-left: 90px solid transparent;
            border-right: 90px solid transparent;
            border-bottom: 150px solid #10b981;
            background: none !important;
            filter: blur(20px);
        }
        @keyframes triangleBreathe {
            0% { transform: scale(0.6) rotate(0deg); border-bottom-color: #10b981; opacity: 0.3; }
            50% { transform: scale(1.3) rotate(180deg); border-bottom-color: #f59e0b; opacity: 0.8; }
            100% { transform: scale(0.6) rotate(360deg); border-bottom-color: #10b981; opacity: 0.3; }
        }

        .timer-display { font-size: 24px; margin-top: 20px; font-weight: 300; letter-spacing: 2px; color: #64748b; }
        .instruction { font-size: 18px; margin-top: 10px; color: #475569; height: 25px; }
    </style>
</head>
<body>

    <div class="controls" id="controlPanel">
        <h3 style="margin-top:0; color:#94a3b8; font-weight: 400;">Deep Healing Space</h3>
        <label style="font-size: 14px; color:#64748b;">সময় দিন (মিনিট):</label>
        <input type="number" id="timeInput" min="1" max="60" value="2">
        <button onclick="startHealingSession()">সেশন শুরু করুন</button>
    </div>

    <div class="canvas-container">
        <!-- তিনটি আলাদা শেপ এলিমেন্ট -->
        <div class="shape circle" id="circleShape"></div>
        <div class="shape square" id="squareShape"></div>
        <div class="shape triangle" id="triangleShape"></div>
    </div>

    <div class="timer-display" id="timerDisplay"></div>
    <div class="instruction" id="instructionText"></div>

    <!-- ইউটিউবের ৪৩২ হার্টজ ডিপ হিলিং এবং মৃদু বৃষ্টির সাউন্ড ট্র্যাকিংয়ের সাথে মিল রেখে রিল্যাক্সিং অডিও -->
    <audio id="bgMusic" loop>
        <source src="https://assets.mixkit.co/active_storage/sfx/2568/2568-84.mp3" type="audio/mpeg">
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" type="audio/mpeg">
    </audio>

    <script>
        let countdown;
        let shapeInterval;
        const audio = document.getElementById('bgMusic');
        const shapes = ['circleShape', 'squareShape', 'triangleShape'];
        const animations = ['circleBreathe 8s ease-in-out infinite', 'squareBreathe 9s ease-in-out infinite', 'triangleBreathe 10s ease-in-out infinite'];

        function startHealingSession() {
            const minutes = document.getElementById('timeInput').value;
            let totalSeconds = minutes * 60;

            if (totalSeconds <= 0 || isNaN(totalSeconds)) return;

            // প্যানেল হাইড
            document.getElementById('controlPanel').style.opacity = '0';
            setTimeout(() => { document.getElementById('controlPanel').style.display = 'none'; }, 500);

            // ডিপ মেডিটেশন রেইন মিউজিক প্লে
            audio.volume = 0.7;
            audio.play().catch(e => console.log("Audio play gesture required."));

            // প্রথম শেপ চালু করা
            changeShape(0);

            // প্রতি ১৫ সেকেন্ড পর পর শেপ এবং কালার থিম পরিবর্তন হবে স্বয়ংক্রিয়ভাবে
            let currentShapeIndex = 0;
            shapeInterval = setInterval(() => {
                currentShapeIndex = (currentShapeIndex + 1) % shapes.length;
                changeShape(currentShapeIndex);
            }, 15000);

            // টাইমার কাউন্টডাউন
            updateUI(totalSeconds);
            countdown = setInterval(() => {
                totalSeconds--;
                updateUI(totalSeconds);

                if (totalSeconds <= 0) {
                    clearInterval(countdown);
                    clearInterval(shapeInterval);
                    endSession();
                }
            }, 1000);
        }

        function changeShape(index) {
            // সব শেপ আগে হাইড করা
            shapes.forEach(id => {
                const s = document.getElementById(id);
                s.style.display = 'none';
                s.style.animation = 'none';
            });

            // নির্দিষ্ট শেপটি অ্যানিমেশনসহ শো করা
            const activeShape = document.getElementById(shapes[index]);
            activeShape.style.display = 'block';
            activeShape.style.animation = animations[index];

            // মেসেজ আপডেট
            const insText = document.getElementById('instructionText');
            if(index === 0) insText.innerText = "গোলকের প্রসারণের সাথে চোখ শিথিল করুন...";
            else if(index === 1) insText.innerText = "ধীর গতির ঘূর্ণনটি অনুভব করুন...";
            else insText.innerText = "গভীর শান্তিতে মগ্ন হোন...";
        }

        function updateUI(seconds) {
            const min = Math.floor(seconds / 60);
            const sec = seconds % 60;
            document.getElementById('timerDisplay').innerText = 
                `${min.toString().padStart(2, '0')}:${sec.toString().padStart(2, '0')}`;
        }

        function endSession() {
            audio.pause();
            audio.currentTime = 0;
            
            shapes.forEach(id => document.getElementById(id).style.display = 'none');
            
            document.getElementById('timerDisplay').innerText = "সেশন শেষ। আপনার চোখ ও মন এখন সতেজ।";
            document.getElementById('instructionText').innerText = "";
            
            setTimeout(() => {
                const cp = document.getElementById('controlPanel');
                cp.style.display = 'block';
                setTimeout(() => cp.style.opacity = '1', 50);
            }, 3000);
        }
    </script>
</body>
</html>
