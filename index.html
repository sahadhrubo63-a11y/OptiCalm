<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OptiCalm - চোখের ও মনের শান্তি</title>
    <style>
        /* মূল ব্যাকগ্রাউন্ড - ডিফল্ট রিল্যাক্সিং ডার্ক থিম */
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #0f172a, #111827);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #e2e8f0;
            overflow: hidden;
            transition: background 2s ease;
        }

        /* কন্ট্রোল প্যানেল */
        .controls {
            z-index: 10;
            text-align: center;
            background: rgba(255, 255, 255, 0.03);
            padding: 25px;
            border-radius: 20px;
            backdrop-filter: blur(15px);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
            max-width: 400px;
            width: 90%;
            transition: opacity 0.5s ease;
        }

        select, input, button {
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 12px;
            color: white;
            border-radius: 10px;
            font-size: 15px;
            outline: none;
            margin: 8px 0;
            width: 100%;
            box-sizing: border-box;
        }

        select option { background: #1e1b4b; color: white; }

        button {
            cursor: pointer;
            background: linear-gradient(90deg, #3b82f6, #8b5cf6);
            font-weight: bold;
            border: none;
            margin-top: 15px;
            transition: 0.3s ease;
        }

        button:hover {
            transform: scale(1.02);
            filter: brightness(1.2);
        }

        /* অ্যানিমেশন কন্টেইনার */
        .canvas-container {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 350px;
            height: 350px;
            position: relative;
        }

        /* মূল গ্লোয়িং অরবিটার */
        .orb {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            display: none;
            filter: blur(12px);
            transition: all 1s ease;
        }

        /* ১. রিল্যাক্সিং মুড: ব্রিদিং এবং পালসিং (সফট ব্লু ও গ্রীন) */
        @keyframes relaxBreathe {
            0% { transform: scale(0.8); background: radial-gradient(circle, #60a5fa, #3b82f6, transparent); box-shadow: 0 0 60px #3b82f6; }
            50% { transform: scale(1.3); background: radial-gradient(circle, #34d399, #10b981, transparent); box-shadow: 0 0 100px #10b981; }
            100% { transform: scale(0.8); background: radial-gradient(circle, #60a5fa, #3b82f6, transparent); box-shadow: 0 0 60px #3b82f6; }
        }

        /* ২. স্লিপিং মুড: ধীর গতির ডিম লাইট গ্লো (সফট পার্পেল ও ওয়ার্ম গোল্ড) */
        @keyframes sleepGlow {
            0% { transform: scale(0.95); opacity: 0.4; background: radial-gradient(circle, #c084fc, #8b5cf6, transparent); box-shadow: 0 0 50px #8b5cf6; }
            50% { transform: scale(1.1); opacity: 0.8; background: radial-gradient(circle, #fde047, #eab308, transparent); box-shadow: 0 0 90px #eab308; }
            100% { transform: scale(0.95); opacity: 0.4; background: radial-gradient(circle, #c084fc, #8b5cf6, transparent); box-shadow: 0 0 50px #8b5cf6; }
        }

        /* ৩. মেলোডি মুড: কসমিক ওয়েভ বা কন্টিনিউয়াস স্পিন (সফট সায়ান ও ম্যাজেন্টা) */
        @keyframes melodyWave {
            0% { transform: scale(1) rotate(0deg); border-radius: 45% 55% 50% 50% / 50% 45% 55% 50%; background: radial-gradient(circle, #22d3ee, #06b6d4, transparent); box-shadow: 0 0 70px #06b6d4; }
            50% { transform: scale(1.2) rotate(180deg); border-radius: 55% 45% 55% 45% / 45% 55% 45% 55%; background: radial-gradient(circle, #f472b6, #ec4899, transparent); box-shadow: 0 0 110px #ec4899; }
            100% { transform: scale(1) rotate(360deg); border-radius: 45% 55% 50% 50% / 50% 45% 55% 50%; background: radial-gradient(circle, #22d3ee, #06b6d4, transparent); box-shadow: 0 0 70px #06b6d4; }
        }

        .timer-display { font-size: 26px; margin-top: 20px; font-weight: 300; letter-spacing: 2px; }
        .instruction { font-size: 18px; margin-top: 10px; color: #94a3b8; height: 25px; text-align: center; }
    </style>
</head>
<body>

    <div class="controls" id="controlPanel">
        <h2 style="margin-top:0; color:#cbd5e1; font-size: 22px;">OptiCalm স্পেস</h2>
        
        <label for="moodSelect">মুড সিলেক্ট করুন:</label>
        <select id="moodSelect">
            <option value="relax">Relaxing (চোখের ক্লান্তি দূর করতে)</option>
            <option value="sleep">Sleeping (গভীর ঘুমের আবেশ পেতে)</option>
            <option value="melody">Melody (মনকে শান্ত ও সতেজ করতে)</option>
        </select>

        <label for="timeInput">সময় নির্ধারণ করুন (মিনিট):</label>
        <input type="number" id="timeInput" min="1" max="60" value="3">

        <button onclick="startSession()">শান্তি সেশন শুরু করুন</button>
    </div>

    <div class="canvas-container">
        <div class="orb" id="relaxOrb"></div>
    </div>

    <div class="timer-display" id="timerDisplay"></div>
    <div class="instruction" id="instructionText"></div>

    <audio id="bgMusic" loop></audio>

    <script>
        let countdown;
        const audio = document.getElementById('bgMusic');

        // মুড ভিত্তিক মিউজিক ও ব্যাকগ্রাউন্ড ডাটাবেজ
        const moodSettings = {
            relax: {
                music: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3", // লাইট নেচার/মেডিটেশন ট্র্যাক
                bg: "linear-gradient(135deg, #0f172a, #0f2b48, #0f172a)",
                animation: "relaxBreathe 9s ease-in-out infinite",
                textIn: "ধীরে ধীরে গভীর শ্বাস নিন...",
                textOut: "ধীরে ধীরে শ্বাস ছেড়ে দিন..."
            },
            sleep: {
                music: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3", // অতি ধীর লয়ের স্লিপ মিউজিক
                bg: "linear-gradient(135deg, #090514, #130a2b, #090514)",
                animation: "sleepGlow 12s ease-in-out infinite",
                textIn: "চোখের পাতা শিথিল করুন...",
                textOut: "সব চিন্তা ছেড়ে দিন..."
            },
            melody: {
                music: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3", // পিয়ানো ও সফট মেলোডি ট্র্যাক
                bg: "linear-gradient(135deg, #061f2d, #083344, #061f2d)",
                animation: "melodyWave 10s ease-in-out infinite",
                textIn: "মিউজিকের ছন্দ অনুভব করুন...",
                textOut: "মস্তিষ্ক শান্ত হতে দিন..."
            }
        };

        function startSession() {
            const mood = document.getElementById('moodSelect').value;
            const minutes = document.getElementById('timeInput').value;
            let totalSeconds = minutes * 60;

            if (totalSeconds <= 0 || isNaN(totalSeconds)) return;

            // প্যানেল হাইড করা
            document.getElementById('controlPanel').style.opacity = '0';
            setTimeout(() => { document.getElementById('controlPanel').style.display = 'none'; }, 500);

            // মুড অনুযায়ী থিম ও মিউজিক সেটআপ
            const config = moodSettings[mood];
            document.body.style.background = config.bg;
            
            audio.src = config.music;
            audio.load();
            audio.play().catch(e => console.log("Audio play blocked, click required."));

            // অ্যানিমেশন অ্যাক্টিভেট করা
            const orb = document.getElementById('relaxOrb');
            orb.style.display = 'block';
            orb.style.animation = config.animation;

            // টাইমার ও টেক্সট আপডেট
            updateUI(totalSeconds, config);

            countdown = setInterval(() => {
                totalSeconds--;
                updateUI(totalSeconds, config);

                if (totalSeconds <= 0) {
                    clearInterval(countdown);
                    endSession();
                }
            }, 1000);
        }

        function updateUI(seconds, config) {
            const min = Math.floor(seconds / 60);
            const sec = seconds % 60;
            document.getElementById('timerDisplay').innerText = 
                `${min.toString().padStart(2, '0')}:${sec.toString().padStart(2, '0')}`;

            // প্রতি ৪-৫ সেকেন্ড পর পর টেক্সট টগল
            const insText = document.getElementById('instructionText');
            if (seconds % 10 >= 5) {
                insText.innerText = config.textIn;
            } else {
                insText.innerText = config.textOut;
            }
        }

        function endSession() {
            audio.pause();
            audio.currentTime = 0;
            
            const orb = document.getElementById('relaxOrb');
            orb.style.animation = 'none';
            orb.style.display = 'none';
            
            document.body.style.background = "linear-gradient(135deg, #0f172a, #111827)";
            document.getElementById('timerDisplay').innerText = "সেশন সম্পূর্ণ হয়েছে। আপনি এখন শান্ত ও মুক্ত।";
            document.getElementById('instructionText').innerText = "";
            
            setTimeout(() => {
                const cp = document.getElementById('controlPanel');
                cp.style.display = 'block';
                setTimeout(() => cp.style.opacity = '1', 50);
            }, 4000);
        }
    </script>
</body>
</html>
