<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OptiCalm - Deep Cosmic Healing Space</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #e2e8f0;
            overflow: hidden;
        }

        .controls {
            z-index: 10;
            text-align: center;
            background: rgba(255, 255, 255, 0.02);
            padding: 25px;
            border-radius: 20px;
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            max-width: 350px;
            width: 85%;
            transition: opacity 0.5s ease;
        }

        input, button {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px;
            color: white;
            border-radius: 10px;
            font-size: 15px;
            outline: none;
            margin: 10px 0;
            width: 100%;
            box-sizing: border-box;
        }

        button {
            cursor: pointer;
            background: linear-gradient(90deg, #1e40af, #0284c7);
            font-weight: bold;
            border: none;
            transition: 0.3s ease;
        }

        button:hover { transform: scale(1.02); filter: brightness(1.2); }

        /* প্রধান কন্টেইনার */
        .main-display-container {
            position: relative;
            width: 100vw;
            height: 500px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* দুই চোখের জন্য দুই পাশের এরিয়া */
        .dual-eye-container {
            display: flex;
            justify-content: space-around;
            align-items: center;
            width: 100%;
            max-width: 1100px;
            height: 100%;
            position: absolute;
        }

        .eye-space {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 45%;
            height: 100%;
        }

        /* সাধারণ শেপ স্টাইল */
        .shape {
            position: absolute;
            width: 240px;
            height: 240px;
            opacity: 0;
            display: none;
            filter: blur(20px);
            mix-blend-mode: screen;
        }

        .circle { border-radius: 50%; }
        @keyframes circleBreathe {
            0% { transform: scale(0.6); background: radial-gradient(circle, #00d2ff, #0066ff, transparent); box-shadow: 0 0 70px #0066ff; opacity: 0.3; }
            50% { transform: scale(1.3); background: radial-gradient(circle, #00ffcc, #00a3ff, transparent); box-shadow: 0 0 140px #00ffcc; opacity: 0.9; }
            100% { transform: scale(0.6); background: radial-gradient(circle, #00d2ff, #0066ff, transparent); box-shadow: 0 0 70px #0066ff; opacity: 0.3; }
        }

        .square { border-radius: 30px; }
        @keyframes squareBreathe {
            0% { transform: scale(0.6) rotate(0deg); background: radial-gradient(circle, #d946ef, #701a75, transparent); box-shadow: 0 0 70px #d946ef; opacity: 0.3; }
            50% { transform: scale(1.2) rotate(45deg); background: radial-gradient(circle, #ff007f, #aa00ff, transparent); box-shadow: 0 0 130px #ff007f; opacity: 0.8; }
            100% { transform: scale(0.6) rotate(90deg); background: radial-gradient(circle, #d946ef, #701a75, transparent); box-shadow: 0 0 70px #d946ef; opacity: 0.3; }
        }

        /* একক কসমিক ওয়েভের জন্য সেন্ট্রাল ক্যানভাস (জিপ ফাইলগুলোর মতো এফেক্ট) */
        #cosmicCanvas {
            position: absolute;
            display: none;
            width: 600px;
            height: 500px;
            filter: blur(12px); /* ৩ডি সফট থ্রেড লাইট লুক দেওয়ার জন্য */
            mix-blend-mode: screen;
            z-index: 5;
        }

        .timer-display { font-size: 24px; margin-top: 20px; font-weight: 300; letter-spacing: 2px; color: #64748b; }
        .instruction { font-size: 18px; margin-top: 10px; color: #475569; height: 25px; text-align: center; }
        #ytPlayer { display: none; }
    </style>
</head>
<body>

    <div class="controls" id="controlPanel">
        <h3 style="margin-top:0; color:#94a3b8; font-weight: 400;">Cosmic Healing Space</h3>
        <label style="font-size: 14px; color:#64748b;">সময় দিন (মিনিট):</label>
        <input type="number" id="timeInput" min="1" max="60" value="2">
        <button onclick="startHealingSession()">সেশন শুরু করুন</button>
    </div>

    <div class="main-display-container">
        <div class="dual-eye-container" id="dualEyeView">
            <div class="eye-space">
                <div class="shape circle" id="left-circleShape"></div>
                <div class="shape square" id="left-squareShape"></div>
            </div>
            <div class="eye-space">
                <div class="shape circle" id="right-circleShape"></div>
                <div class="shape square" id="right-squareShape"></div>
            </div>
        </div>

        <canvas id="cosmicCanvas" width="700" height="500"></canvas>
    </div>

    <div class="timer-display" id="timerDisplay"></div>
    <div class="instruction" id="instructionText"></div>
    <div id="ytPlayer"></div>

    <script>
        let countdown;
        let modeInterval;
        let player;
        let animationFrameId;
        
        const cosmicCanvas = document.getElementById('cosmicCanvas');
        const ctx = cosmicCanvas.getContext('2d');
        
        let waveTime = 0;
        let isCosmicActive = false;

        // ইউটিউব API লোড
        const tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        document.getElementsByTagName('head')[0].appendChild(tag);

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('ytPlayer', {
                height: '0', width: '0', videoId: 'I3OJUwILelU',
                playerVars: { 'autoplay': 0, 'controls': 0, 'loop': 1, 'playlist': 'I3OJUwILelU' }
            });
        }

        // আপলোড করা জিপগুলোর মতো ৩ডি থ্রেড সাইনেসোইডাল তরঙ্গ আঁকার ফাংশন
        function renderCosmicWaves() {
            if (!isCosmicActive) return;
            waveTime += 0.02;

            const w = cosmicCanvas.width;
            const h = cosmicCanvas.height;
            ctx.clearRect(0, 0, w, h);

            ctx.save();
            ctx.translate(w / 2, h / 2);

            // ছোট থেকে বড় এবং বড় থেকে আবার ছোট হওয়ার মূল রিল্যাক্সিং ব্রিদিং মেকানিজম
            let pulseScale = 1.0 + Math.sin(waveTime * 0.6) * 0.35; 
            ctx.scale(pulseScale, pulseScale);

            // একাধিক জটিল ওয়েভ লেয়ার ওভারল্যাপ (যা purplelight এবং cosmic জিপের মতো দেখায়)
            for (let k = 0; k < 4; k++) {
                ctx.beginPath();
                
                // কালার সিলেকশন: কসমিক ব্লু, সায়ান এবং পার্পেল লাইটের মিক্সড কালার
                let colors = [
                    'rgba(0, 162, 255, 0.6)',  // ডিপ ব্লু
                    'rgba(0, 255, 204, 0.5)',  // সায়ান গ্রীন
                    'rgba(217, 70, 239, 0.5)', // পার্পেল লাইট
                    'rgba(139, 92, 246, 0.4)'  // ভায়োলেট
                ];
                
                for (let x = -250; x <= 250; x += 2) {
                    // গাণিতিক তরঙ্গ ফর্মুলা (Sin/Cos মিক্সড থ্রেড মোশন)
                    let angle = (x * 0.02) + waveTime + (k * Math.PI / 2);
                    let y = Math.sin(angle) * 60 * Math.cos(angle * 0.5 + waveTime * 0.3);
                    
                    // থ্রিডি ইন্টারলেসড মোশনের জন্য এক্স অক্ষের ওপর একটু কার্ভ দেওয়া
                    let twistX = x + Math.sin(waveTime + k) * 15;

                    if (x === -250) ctx.moveTo(twistX, y);
                    else ctx.lineTo(twistX, y);
                }

                ctx.lineWidth = 3;
                ctx.strokeStyle = colors[k];
                ctx.stroke();
            }

            ctx.restore();
            animationFrameId = requestAnimationFrame(renderCosmicWaves);
        }

        function startHealingSession() {
            const minutes = document.getElementById('timeInput').value;
            let totalSeconds = minutes * 60;
            if (totalSeconds <= 0 || isNaN(totalSeconds)) return;

            document.getElementById('controlPanel').style.opacity = '0';
            setTimeout(() => { document.getElementById('controlPanel').style.display = 'none'; }, 500);

            if (player && player.playVideo) { player.setVolume(80); player.playVideo(); }

            let currentMode = 0; // 0: Dual Circle, 1: Dual Square, 2: Single Cosmic Wave
            changeMode(currentMode);

            // প্রতি ১৫ সেকেন্ড পর পর মুড চেঞ্জ হবে
            modeInterval = setInterval(() => {
                currentMode = (currentMode + 1) % 3;
                changeMode(currentMode);
            }, 15000);

            updateUI(totalSeconds);
            countdown = setInterval(() => {
                totalSeconds--;
                updateUI(totalSeconds);
                if (totalSeconds <= 0) {
                    clearInterval(countdown);
                    clearInterval(modeInterval);
                    endSession();
                }
            }, 1000);
        }

        function changeMode(mode) {
            // সমস্ত এলিমেন্ট ডিফল্ট হাইড
            document.getElementById('left-circleShape').style.display = 'none';
            document.getElementById('right-circleShape').style.display = 'none';
            document.getElementById('left-squareShape').style.display = 'none';
            document.getElementById('right-squareShape').style.display = 'none';
            document.getElementById('dualEyeView').style.display = 'none';
            cosmicCanvas.style.display = 'none';
            isCosmicActive = false;
            cancelAnimationFrame(animationFrameId);

            const insText = document.getElementById('instructionText');

            if (mode === 0) {
                document.getElementById('dualEyeView').style.display = 'flex';
                document.getElementById('left-circleShape').style.display = 'block';
                document.getElementById('left-circleShape').style.animation = 'circleBreathe 8s ease-in-out infinite';
                document.getElementById('right-circleShape').style.display = 'block';
                document.getElementById('right-circleShape').style.animation = 'circleBreathe 8s ease-in-out infinite';
                insText.innerText = "উভয় বৃত্তের প্রসারণের সাথে দুই চোখ শিথিল করুন...";
            } else if (mode === 1) {
                document.getElementById('dualEyeView').style.display = 'flex';
                document.getElementById('left-squareShape').style.display = 'block';
                document.getElementById('left-squareShape').style.animation = 'squareBreathe 9s ease-in-out infinite';
                document.getElementById('right-squareShape').style.display = 'block';
                document.getElementById('right-squareShape').style.animation = 'squareBreathe 9s ease-in-out infinite';
                insText.innerText = "ধীর গতির আবর্তনটি অনুভব করুন...";
            } else if (mode === 2) {
                // আপনার জিপ ফাইলের মতো ১টি মাত্র বড় সেন্ট্রাল ওয়েভ মুড অ্যাক্টিভেট
                cosmicCanvas.style.display = 'block';
                isCosmicActive = true;
                renderCosmicWaves();
                insText.innerText = "কেন্দ্রীয় কসমিক তরঙ্গের স্পন্দনে চোখ বন্ধ বা খোলা রেখে মগ্ন হোন...";
            }
        }

        function updateUI(seconds) {
            const min = Math.floor(seconds / 60);
            const sec = seconds % 60;
            document.getElementById('timerDisplay').innerText = 
                `${min.toString().padStart(2, '0')}:${sec.toString().padStart(2, '0')}`;
        }

        function endSession() {
            if (player && player.pauseVideo) player.pauseVideo();
            isCosmicActive = false;
            cancelAnimationFrame(animationFrameId);
            
            document.getElementById('left-circleShape').style.display = 'none';
            document.getElementById('right-circleShape').style.display = 'none';
            document.getElementById('left-squareShape').style.display = 'none';
            document.getElementById('right-squareShape').style.display = 'none';
            cosmicCanvas.style.display = 'none';
            document.getElementById('dualEyeView').style.display = 'flex';
            
            document.getElementById('timerDisplay').innerText = "সেশন শেষ। আপনার চোখ ও মন এখন সতেজ।";
            document.getElementById('instructionText').innerText = "";
            
            setTimeout(() => {
                const cp = document.getElementById('controlPanel');
                cp.style.display = 'block';
                setTimeout(() => cp.style.opacity = '1', 50);
            }, 3000);
        }
    </script>
</body>
</html>
