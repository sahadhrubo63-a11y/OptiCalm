<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>চোখের ও মনের শান্তি - Relaxation Space</title>
    <style>
        /* পুরো স্ক্রিনের ব্যাকগ্রাউন্ড - চোখের জন্য আরামদায়ক ডার্ক গ্রেডিয়েন্ট */
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #0f172a, #1e1b4b, #0f172a);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #e2e8f0;
            overflow: hidden;
        }

        /* ব্যাকগ্রাউন্ডের ধীর গতির অ্যানিমেশন */
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* কন্ট্রোল প্যানেল (ইনপুট ও বাটনের জন্য) */
        .controls {
            z-index: 10;
            text-align: center;
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            margin-bottom: 30px;
            transition: opacity 0.5s ease;
        }

        input, button {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 10px 15px;
            color: white;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            margin: 5px;
        }

        button {
            cursor: pointer;
            background: #3b82f6;
            font-weight: bold;
            border: none;
            transition: 0.3s;
        }

        button:hover {
            background: #1d4ed8;
            transform: scale(1.05);
        }

        /* মূল অ্যানিমেশন এলিমেন্ট (Breathing Orb) - যা চোখে প্রশান্তি দেবে */
        .canvas-container {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 300px;
            height: 300px;
        }

        .orb {
            width: 150px;
            height: 150px;
            background: radial-gradient(circle, #60a5fa, #3b82f6, transparent);
            border-radius: 50%;
            filter: blur(10px);
            box-shadow: 0 0 60px #3b82f6, 0 0 100px #1d4ed8;
            opacity: 0;
            display: none;
        }

        /* শ্বাসের ওঠানামার মতো অ্যানিমেশন (Inhale/Exhale) */
        @keyframes breathe {
            0% { transform: scale(0.8); filter: blur(15px); opacity: 0.6; }
            50% { transform: scale(1.4); filter: blur(5px); opacity: 1; box-shadow: 0 0 80px #10b981, 0 0 120px #059669; }
            100% { transform: scale(0.8); filter: blur(15px); opacity: 0.6; }
        }

        /* টাইমার টেক্সট */
        .timer-display {
            font-size: 24px;
            margin-top: 20px;
            font-weight: 300;
            letter-spacing: 2px;
        }

        /* রিল্যাক্সিং মেসেজ */
        .instruction {
            font-size: 18px;
            margin-top: 10px;
            color: #94a3b8;
            height: 25px;
        }
    </style>
</head>
<body>

    <div class="controls" id="controlPanel">
        <h3 style="margin-top:0;">আপনার রিল্যাক্সেশন টাইম সেট করুন</h3>
        <input type="number" id="timeInput" min="1" max="60" value="2" placeholder="মিনিট">
        <button onclick="startRelaxation()">শুরু করুন</button>
    </div>

    <div class="canvas-container">
        <div class="orb" id="relaxOrb"></div>
    </div>

    <div class="timer-display" id="timerDisplay"></div>
    <div class="instruction" id="instructionText"></div>

    <audio id="bgMusic" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <script>
        let countdown;
        const audio = document.getElementById('bgMusic');

        function startRelaxation() {
            const minutes = document.getElementById('timeInput').value;
            let totalSeconds = minutes * 60;

            if (totalSeconds <= 0 || isNaN(totalSeconds)) {
                alert("দয়া করে সঠিক সময় দিন।");
                return;
            }

            // ইন্টারফেস পরিবর্তন
            document.getElementById('controlPanel').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('controlPanel').style.display = 'none';
            }, 500);

            // অ্যানিমেশন ও মিউজিক চালু করা
            const orb = document.getElementById('relaxOrb');
            orb.style.display = 'block';
            orb.style.animation = 'breathe 8s ease-in-out infinite'; // ৮ সেকেন্ডের স্মুথ সাইকেল
            audio.play();

            // টাইমার ও ইন্সট্রাকশন চালু
            updateTimer(totalSeconds);
            updateInstruction(totalSeconds);

            countdown = setInterval(() => {
                totalSeconds--;
                updateTimer(totalSeconds);
                updateInstruction(totalSeconds);

                if (totalSeconds <= 0) {
                    clearInterval(countdown);
                    endRelaxation();
                }
            }, 1000);
        }

        function updateTimer(seconds) {
            const min = Math.floor(seconds / 60);
            const sec = seconds % 60;
            document.getElementById('timerDisplay').innerText = 
                `${min.toString().padStart(2, '0')}:${sec.toString().padStart(2, '0')}`;
        }

        function updateInstruction(seconds) {
            const insText = document.getElementById('instructionText');
            // প্রতি ৪ সেকেন্ড পর পর শ্বাস নেওয়া ও ছাড়ার নির্দেশ (চোখ বন্ধ বা খোলা রেখে করা যাবে)
            if (seconds % 8 >= 4) {
                insText.innerText = "ধীরে ধীরে গভীর শ্বাস নিন...";
                insText.style.color = "#60a5fa";
            } else {
                insText.innerText = "ধীরে ধীরে শ্বাস ছেড়ে দিন...";
                insText.style.color = "#10b981";
            }
        }

        function endRelaxation() {
            audio.pause();
            audio.currentTime = 0;
            const orb = document.getElementById('relaxOrb');
            orb.style.animation = 'none';
            orb.style.display = 'none';
            
            document.getElementById('timerDisplay').innerText = "অধিবেশন শেষ! আপনি এখন শান্ত।";
            document.getElementById('instructionText').innerText = "";
            
            // কন্ট্রোল প্যানেল ফিরিয়ে আনা
            setTimeout(() => {
                const cp = document.getElementById('controlPanel');
                cp.style.display = 'block';
                setTimeout(() => cp.style.opacity = '1', 50);
            }, 3000);
        }
    </script>
</body>
</html>
